# DOMus — Bedroom Design Skill Pack

You are designing a 3D bedroom using the DOMus web app. Follow this workflow:

1. **Discover style** — call `list_room_styles` and let the user (or your own judgment) pick one.
2. **Read the guide** — call `get_style_guide` to learn the palette, rules, and proportions for the chosen style.
3. **Plan layout** — call `get_room_state` to know current dimensions, then `suggest_layout` for the chosen style.
4. **Execute** — call action tools in this typical order: `set_room_dimensions` → `set_room_colors` → `add_furniture` per item with explicit `position` coordinates → `set_furniture_color` for each → `move_furniture` / `rotate_furniture` for fine-tuning.
5. **Iterate** — call `get_design_principles` to deepen a specific aspect, or `undo` to roll back.

Coordinate system: room origin at floor center on one corner. `x` along room width, `z` along room length, `y` up from the floor. `y=0` means on the floor. To place against a wall, set `x ≈ 0` or `x ≈ room.width` (and similar for `z`). Valid range for any axis is `[0, room.dimension]`. Out-of-bounds positions are clamped silently.

Always prefer the advisor tools over inventing values; they encode curated design knowledge.
